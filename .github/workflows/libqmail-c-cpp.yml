name: libqmail Ubuntu, Mac OSX CI

on:
  push:
    paths:
      - '**'
      - .github/workflows/libqmail-c-cpp.yml
      - '!**/debian/*'
      - '!**/libqmail.spec.in'
      - '!**/doc/*'
      - '!**.md'
      - '!**.3'
      - '!**/obs/*'
      - '!**/libqmail-freebsd.yml'
      - '!**/codeql.yml'
      - '!**/libqmail-obs.yml'
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.host }}-${{ matrix.config.name }}
    runs-on: ${{ matrix.host }}
    strategy:
      fail-fast: false
      matrix:
        host: [ubuntu-latest, macos-latest]
    
    steps:
    - name: checkout
      uses: actions/checkout@v4
      
    - name: Darwin
      run: |
        if [ "${OS}" = "macos-latest" ] ; then
          brew install automake autoconf libtool pkgconfig openssl
        fi
        if [ "${OS}" = "ubuntu-latest" ] ; then
          sudo apt-get install gcc g++ automake autoconf libtool libssl-dev libsodium-dev
        fi
      env:
        OS: ${{ matrix.host }}

    - name: build libqmail
      run: |
        if [ "${OS}" = "macos-latest" ] ; then
          # Dynamically fetch base paths for Homebrew dependencies
          OPENSSL_PREFIX=$(brew --prefix openssl@3)
          export OPENSSL_PREFIX

          # Combine both paths cleanly into your compilation flags
          export CPPFLAGS="-I${OPENSSL_PREFIX}/include"
          export LDFLAGS="-L${OPENSSL_PREFIX}/lib"
        else
          # Standard flags for Ubuntu environment
          export CPPFLAGS=""
          export LDFLAGS=""
        fi
        ./default.configure
        make
      env:
        OS: ${{ matrix.host }}
